<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d232a"/>
      <stop offset="100%" stop-color="#15191e"/>
    </linearGradient>
    <linearGradient id="n" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle grid lines (Matrix feel) -->
  <g opacity="0.04" stroke="#a78bfa" stroke-width="1">
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
  </g>
  <!-- Terminal brackets -->
  <g opacity="0.12" fill="none" stroke="#a78bfa" stroke-width="6" stroke-linecap="round">
    <polyline points="100,160 72,256 100,352"/>
    <polyline points="412,160 440,256 412,352"/>
  </g>
  <!-- "N" letterform -->
  <g filter="url(#glow)">
    <path d="M168,368 L168,144 L344,368 L344,144"
          fill="none" stroke="url(#n)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Accent dot (cursor blink feel) -->
  <circle cx="382" cy="380" r="8" fill="#a78bfa" opacity="0.6"/>
</svg>
